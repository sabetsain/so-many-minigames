<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOTD Games</title>
    <link rel="stylesheet" href="./assets/styles.css">
</head>
<body class="menu-page">
    <div class="home-container">
        <div class="home-header">
            <h1><span class="title-red">V</span><span class="title-blue">O</span><span class="title-yellow">T</span><span class="title-red">D</span> Games</h1>
            <p>Pick a game. Have some fun.</p>
        </div>

        <div class="games-grid">
            <a href="./games/snake/" class="game-card game-card--red">
                <div class="game-card-number">01</div>
                <span class="game-card-icon">&#x1F40D;</span>
                <h2>Snake</h2>
                <p>Eat. Grow. Don't crash.</p>
                <div class="game-card-play">PLAY</div>
            </a>

            <a href="./games/wordguesser/" class="game-card game-card--green">
                <div class="game-card-number">02</div>
                <span class="game-card-icon">&#x1F4D6;</span>
                <h2>Word Guesser</h2>
                <p>One word. Six tries. Daily.</p>
                <div class="game-card-play">PLAY</div>
            </a>

            <div class="game-card game-card--yellow game-card--locked">
                <div class="game-card-number">03</div>
                <span class="game-card-icon">&#x2753;</span>
                <h2>Coming Soon</h2>
                <p>Stay tuned for more.</p>
                <div class="game-card-play">SOON</div>
            </div>
        </div>

        <div class="footer">
            <p>VOTD Games &mdash; 2025</p>
        </div>
    </div>
</body>
</html>
